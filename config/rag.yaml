vector_db:
  type: "chroma"
  collection_name: "documents"
  persist_directory: "~/.deepshell-ai/chroma_db"

embedding:
  type: "local"           # "dashscope" | "local"
  model: "text-embedding-v3"
  api_key: "${ALIYUN_API_KEY}"
  local:
    model_path: "${EMBEDDING_MODEL_PATH}"
    model_name: "BAAI/bge-small-zh-v1.5"
    device: "cpu"                            # "cpu" | "cuda"
    encode_kwargs:
      normalize_embeddings: true

chunk_size: 128
chunk_overlap: 32
supported_file_types:
  - ".txt"
  - ".pdf"
  - ".docx"
  - ".md"
  - ".xlsx"
self_rag: false
feedback:
  type: "aliyun"
  api_key: "${ALIYUN_API_KEY}"
  model_name: "qwen-plus"
  temperature: 0.7
  max_tokens: 2000
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"

hybrid_search:
  enabled: true
  keyword_weight: 0.3
  semantic_weight: 0.7
  score_threshold: 0.3   # 融合分数低于此值的结果将被过滤
  keyword_top_k: 20      # BM25 预取数量
  semantic_top_k: 20     # 语义预取数量
